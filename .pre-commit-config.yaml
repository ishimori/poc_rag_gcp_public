repos:
  # Python: Ruff (lint + format check)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        args: [--check]

  # TypeScript/React: ESLint
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd ui && npx eslint --max-warnings 0 .'
        language: system
        files: '^ui/.*\.(ts|tsx)$'
        pass_filenames: false
